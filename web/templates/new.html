<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nouveau workspace</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header class="hero">
    <h1>Nouveau workspace</h1>
    <p class="tagline">Donne-lui un nom — tu pourras le retrouver et le relancer plus tard.</p>
  </header>

  <form id="new-form" class="card" autocomplete="off">
    <div class="form-field">
      <label for="workspace_name">Nom du workspace <span class="required">*</span></label>
      <input type="text" id="workspace_name" name="workspace_name"
             pattern="[A-Za-z0-9_-]{1,40}"
             placeholder="ex: tp1, prod, staging-eu, demo-cours"
             required autofocus>
      <small class="help">a-z, A-Z, 0-9, _, - (max 40 caractères)</small>
    </div>

    <div id="form-errors" class="alert alert-error hidden"></div>

    <div class="actions">
      <a href="{{ url_for('index') }}" class="btn btn-ghost">← Annuler</a>
      <button type="submit" class="btn btn-primary">Créer →</button>
    </div>
  </form>

  <script src="{{ url_for('static', filename='new.js') }}"></script>
</body>
</html>
